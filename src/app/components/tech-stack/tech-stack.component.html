<section
  id="stack"
  appInView
  (visible)="onInView()"
  class="min-h-screen py-20 px-4 bg-black text-white relative overflow-hidden"
>
  <div class="absolute inset-0">
    @for (i of gridLines; track i) {
      <div
        class="stack-grid-line absolute h-px bg-gradient-to-r from-transparent via-green-500/20 to-transparent left-0 right-0"
        [style.top.%]="i * 10"
        [class.stack-line-active]="visible()"
        [style.animation-delay.s]="i * 0.2"
      ></div>
    }
  </div>

  <div class="max-w-6xl mx-auto relative z-10">
    <div class="tech-head" [class.tech-visible]="visible()">
      <div class="font-mono text-sm text-green-400 mb-8">
        <span class="text-gray-600">// </span>Tech Stack
      </div>

      <h2 class="text-5xl md:text-7xl font-black mb-12 tracking-tight">
        TOOLS &<br />
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500"
        >
          TECHNOLOGIES
        </span>
      </h2>

      <div class="font-mono text-sm mb-8 text-gray-500">
        <span class="text-green-400">const</span> stack = [
      </div>

      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pl-8">
        @for (tech of technologies; track tech.name; let index = $index) {
          <div
            class="tech-item group relative"
            [class.tech-item-visible]="visible()"
            [style.transition-delay.ms]="visible() ? index * 50 : 0"
          >
            <div
              class="border border-gray-800 bg-zinc-950/50 p-4 hover:border-green-400/50 transition-all cursor-default backdrop-blur-sm"
            >
              <div class="font-mono text-sm mb-1" [ngClass]="tech.color">
                {{ tech.name }}
              </div>
              <div class="text-xs text-gray-600 font-mono">.{{ tech.category }}</div>
            </div>
            <div class="tech-hover-line"></div>
          </div>
        }
      </div>

      <div class="font-mono text-sm mt-8 text-gray-500">];</div>

      <div class="tech-stats mt-16 grid grid-cols-1 md:grid-cols-3 gap-6" [class.tech-stats-visible]="visible()">
        <div class="border-l-2 border-green-400 pl-6">
          <div class="font-mono text-3xl text-white mb-2">20+</div>
          <div class="text-sm text-gray-500 uppercase tracking-wider">Technologies Mastered</div>
        </div>
        <div class="border-l-2 border-blue-400 pl-6">
          <div class="font-mono text-3xl text-white mb-2">Full-Stack</div>
          <div class="text-sm text-gray-500 uppercase tracking-wider">Development Approach</div>
        </div>
        <div class="border-l-2 border-purple-400 pl-6">
          <div class="font-mono text-3xl text-white mb-2">∞</div>
          <div class="text-sm text-gray-500 uppercase tracking-wider">Continuous Learning</div>
        </div>
      </div>
    </div>
  </div>
</section>
