<div
  class="scroll-progress-host fixed top-0 left-0 right-0 z-[60] pointer-events-none pt-[env(safe-area-inset-top)] pl-[max(0px,env(safe-area-inset-left))] pr-[max(0px,env(safe-area-inset-right))]"
  [class.scroll-progress-host--hidden]="!barVisible"
  aria-hidden="true"
>
  <div
    class="h-[3px] w-full bg-zinc-950/95 backdrop-blur-sm border-b border-zinc-800/90"
  >
    <div
      class="scroll-progress-fill h-full bg-gradient-to-r from-green-400 via-emerald-400 to-cyan-400 shadow-[0_0_14px_rgba(74,222,128,0.35)]"
      [style.width.%]="progressPct"
    ></div>
  </div>
</div>
